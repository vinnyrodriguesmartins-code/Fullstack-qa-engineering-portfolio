version: "3.8"

services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    volumes:
      - ./api:/src:cached
      - ./data:/app/Data
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:80
      ConnectionStrings__DefaultConnection: "Data Source=/app/Data/minhasfinancas.db"
    command: ["dotnet", "watch", "run", "--urls", "http://0.0.0.0:80"]
    ports:
      - "5000:80"

  web:
    image: oven/bun:latest
    working_dir: /app
    volumes:
      - ./web:/app:cached
      - /app/node_modules
    command: sh -c "bun install --no-lockfile && bunx vite --host 0.0.0.0 --port 5173"
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes: {}