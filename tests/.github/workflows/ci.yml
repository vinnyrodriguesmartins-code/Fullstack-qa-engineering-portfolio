name: Tests CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tests
        uses: actions/checkout@v4
        with:
          path: tests

      # A aplicação deve ser obtida separadamente (repo privado do exame).
      # Exemplo: checkout de um segundo repositório ou artefato fornecido.
      - name: Checkout application source
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.APP_SOURCE_REPO }}
          path: ExameDesenvolvedorDeTestes
          token: ${{ secrets.APP_SOURCE_TOKEN }}
        continue-on-error: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore and test backend
        working-directory: tests/backend
        run: |
          dotnet restore MinhasFinancas.Tests.sln
          dotnet test MinhasFinancas.Tests.sln --no-restore --verbosity normal

  frontend-unit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tests
        uses: actions/checkout@v4
        with:
          path: tests

      - name: Checkout application source (web)
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.APP_SOURCE_REPO }}
          path: ExameDesenvolvedorDeTestes
          token: ${{ secrets.APP_SOURCE_TOKEN }}
        continue-on-error: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: tests/frontend/package.json

      - name: Install and run Vitest
        working-directory: tests/frontend
        run: |
          npm ci || npm install
          npm run test:unit

  e2e:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-unit]
    if: vars.RUN_E2E == 'true'
    steps:
      - name: Checkout tests
        uses: actions/checkout@v4
        with:
          path: tests

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright
        working-directory: tests/frontend
        run: |
          npm ci || npm install
          npx playwright install --with-deps chromium

      - name: Run E2E
        working-directory: tests/frontend
        env:
          WEB_BASE_URL: ${{ vars.WEB_BASE_URL }}
          API_BASE_URL: ${{ vars.API_BASE_URL }}
        run: npm run test:e2e
